<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clase Bootstrap - 17 marzo</title>

    <!-- css de bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- tu css -->
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>

    <header class="header_bg colums">

        <nav class="navbar navbar-expand-lg top-nav">
            <div class="container-fluid">
                <div class="collapse navbar-collapse r-nav">
                    <div class="navbar-nav">
                        <a class="nav-link" href="#"><span class="text-shadow">Home</span></a>
                        <a class="nav-link" href="#"><span class="text-shadow">Features</span></a>
                        <a class="nav-link" href="#"><span class="text-shadow">Pricing</span></a>
                        <a class="nav-link" href="#"><span class="text-shadow">Disabled</span></a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="cuadro_header">
            <div class="titulo_header">
                <h1>Melina Rivera</h1>
                <h3>Psicóloga + RRHH</h3>
            </div>
        </div>

    </header>

    <section class="about_section">
        <div class="overlapping-image-container">
            <img class="profile_img"
                src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=600&h=600&q=80">
        </div>

        <p><b>Cuidar tu salud mental es el primer paso para transformar tu vida</b></p>
    </section>

    <!-- CARDS -->
    <section class="cards_section py-5">
        <div class="container">
            <div class="row g-4">

                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card h-100 custom-card">
                        <img src="https://images.unsplash.com/photo-1588072432836-e10032774350"
                            class="card-img-top">
                        <div class="card-body">
                            <h5 class="card-title">Niños</h5>
                            <p class="card-text">Texto de ejemplo.</p>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card h-100 custom-card">
                        <img src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac"
                            class="card-img-top">
                        <div class="card-body">
                            <h5 class="card-title">Adolescentes</h5>
                            <p class="card-text">Texto de ejemplo.</p>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card h-100 custom-card">
                        <img src="https://images.unsplash.com/photo-1584515933487-779824d29309"
                            class="card-img-top">
                        <div class="card-body">
                            <h5 class="card-title">Adultos</h5>
                            <p class="card-text">Texto de ejemplo.</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- CONTACTO -->
    <section class="contact_section">
        <div class="container">
            <h2 class="contact_title">Contacto</h2>

            <form class="row g-4">
                <div class="col-12 col-md-6">
                    <input type="text" class="form-control contact_input" placeholder="NOMBRE">
                </div>

                <div class="col-12 col-md-6">
                    <input type="email" class="form-control contact_input" placeholder="CORREO">
                </div>

                <div class="col-12">
                    <label class="form-label contact_label">Mensaje</label>
                    <textarea class="form-control contact_textarea" rows="6"></textarea>
                </div>
            </form>
        </div>
    </section>

    <!-- script bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
